name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CLI script
        run: |
          bash -n devskin-cli.sh
          echo "Syntax check passed"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p dist
          cp devskin-cli.sh dist/devskin
          cp install.sh dist/install.sh
          chmod +x dist/devskin dist/install.sh
          tar -czf dist/devskin-cli-${{ steps.version.outputs.version }}-linux.tar.gz -C dist devskin
          cp dist/devskin-cli-${{ steps.version.outputs.version }}-linux.tar.gz dist/devskin-cli-${{ steps.version.outputs.version }}-darwin.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/devskin-cli-${{ steps.version.outputs.version }}-linux.tar.gz
            dist/devskin-cli-${{ steps.version.outputs.version }}-darwin.tar.gz
            dist/install.sh

  update-installer:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release
        run: |
          echo "CLI released via GitHub. Install with:"
          echo "curl -fsSL https://raw.githubusercontent.com/devskin1/cloud-devskin-cli/main/install.sh | bash"

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        run: |
          echo "TODO: Update homebrew-tap repo with new formula for ${{ steps.version.outputs.version }}"
          # Example: use a repository_dispatch to trigger the tap repo update
